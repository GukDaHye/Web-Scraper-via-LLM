<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extraction Results</title>
    <style>
      :root {
        --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --bg-color: #ffffff;
        --text-color: #333333;
        --primary-color: #10b981;
        --primary-hover: #059669;
        --button-text: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #1a1a2e;
          --text-color: #e2e8f0;
        }
      }
      body {
        font-family: var(--font-family);
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 40px;
        max-width: 800px;
        mx-auto;
      }
      pre {
        background: rgba(0,0,0,0.05);
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      @media (prefers-color-scheme: dark) {
        pre { background: rgba(255,255,255,0.05); }
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background-color: var(--primary-color);
        color: var(--button-text);
        cursor: pointer;
        font-weight: 600;
        margin-right: 12px;
      }
      button:hover {
        background-color: var(--primary-hover);
      }
    </style>
  </head>
  <body>
    <h1>Extraction Results</h1>
    <div style="margin-bottom: 24px;">
      <button id="downloadJsonBtn">Download JSON</button>
      <button id="downloadCsvBtn">Download CSV</button>
    </div>
    <div id="loadingMsg">Loading results from storage...</div>
    <pre id="outputView" style="display: none;"></pre>

    <script type="module" src="./src/result.ts"></script>
  </body>
</html>
